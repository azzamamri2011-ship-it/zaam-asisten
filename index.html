<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZaamAi Pro - Horizon Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #6366f1;
            --bg-dark: #020203;
            --panel: #08080a;
        }

        * { box-sizing: border-box; outline: none !important; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f4f4f5; 
            margin: 0;
            /* Gunakan svh agar pas dengan browser mobile */
            height: 100svh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        .mesh-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.12), transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.08), transparent 40%);
            z-index: -1;
        }

        /* SIDEBAR FIXED */
        #sidebar { 
            position: fixed; top: 0; left: 0; bottom: 0; width: 300px;
            background: var(--panel); border-right: 1px solid rgba(255, 255, 255, 0.03);
            transform: translate3d(-100%, 0, 0);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100; display: flex; flex-direction: column;
        }
        #sidebar.active { transform: translate3d(0, 0, 0); }

        #overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px); opacity: 0; visibility: hidden;
            transition: all 0.4s ease; z-index: 90;
        }
        #sidebar.active ~ #overlay { opacity: 1; visibility: visible; }

        /* STATUS LAMP (ACTIVE HORIZON) */
        .status-dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%;
            position: relative; box-shadow: 0 0 12px #10b981;
        }
        .status-dot::after {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            background: #10b981; opacity: 0.4; animation: blink 2s infinite;
        }
        @keyframes blink { 0% {transform: scale(1); opacity: 0.4;} 70% {transform: scale(2.2); opacity: 0;} 100% {opacity: 0;} }

        /* VIEWPORT & CHAT AREA */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        /* INPUT AREA (FIXED BOTTOM) */
        .footer-input {
            padding: 16px;
            background: linear-gradient(to top, var(--bg-dark) 80%, transparent);
            z-index: 10;
        }

        .input-wrapper {
            background: #0f0f13;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: #14141a;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            padding: 12px 0;
            max-height: 150px;
            font-size: 15px;
            line-height: 1.5;
        }

        .btn-send {
            width: 45px;
            height: 45px;
            background: var(--accent);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .btn-send:active { transform: scale(0.9); opacity: 0.8; }

        /* BUBBLES */
        .bubble-ai { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px 20px 20px 4px; }
        .bubble-user { background: var(--accent); border-radius: 20px 20px 4px 20px; }

        .animate-msg { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <aside id="sidebar">
        <div class="p-8 border-b border-white/5 space-y-6">
            <div class="flex items-center justify-between">
                <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">History</span>
                <button onclick="toggleSidebar()" class="text-zinc-500"><i class="fas fa-times"></i></button>
            </div>
            <button id="new-chat-btn" class="w-full py-4 rounded-xl bg-white/5 hover:bg-white/10 text-white font-bold text-xs uppercase tracking-widest border border-white/5 transition-all">
                + Chat Baru
            </button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll"></div>
    </aside>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div class="main-container">
        <header class="h-20 flex items-center justify-between px-6 border-b border-white/5 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5">
                    <i class="fas fa-bars-staggered text-zinc-400"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-sm font-bold text-white">Zaam<span class="text-indigo-400">Ai</span></h1>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <div class="status-dot"></div>
                            <span class="text-[8px] font-bold text-emerald-500 uppercase tracking-widest">Active Horizon</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main id="chat-window">
            <div id="messages-list" class="max-w-3xl mx-auto p-6 space-y-8">
                <div id="welcome-ui" class="text-center py-20 animate-msg">
                    <div class="w-20 h-20 bg-indigo-600/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20">
                        <i class="fas fa-robot text-3xl text-indigo-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">SAYA ZAAMAI SIAP MEMBANTU ANDA</h2>
                    <p class="text-zinc-500 text-sm mt-3 px-6">Berikan instruksi kompleks atau sekedar sapaan hangat untuk memulai.</p>
                </div>
            </div>
        </main>

        <footer class="footer-input">
            <div class="max-w-3xl mx-auto">
                <div id="ai-typing" class="hidden mb-3 ml-4 flex items-center gap-2">
                    <div class="flex gap-1">
                        <span class="w-1 h-1 bg-indigo-500 rounded-full animate-bounce"></span>
                        <span class="w-1 h-1 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:0.2s"></span>
                    </div>
                    <span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">ZaamAi Processing</span>
                </div>
                
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Tulis pesan..." rows="1"></textarea>
                    <button id="send-btn" class="btn-send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="text-[8px] text-zinc-700 text-center mt-4 font-bold uppercase tracking-[0.4em]">Integrated Intelligence System</div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
                                                                                                       </html>
