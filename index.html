<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZaamAi Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent-color: #6366f1;
            --bg-ultra-dark: #070709;
            --sidebar-bg: #0b0b0e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-ultra-dark); 
            color: #e4e4e7; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 0;
            transition: width 0.4s cubic-bezier(0.65, 0, 0.35, 1);
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            height: 100%;
            overflow: hidden;
        }

        #sidebar.open { width: 300px; }

        #sidebar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            z-index: 90;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #sidebar-overlay.visible { display: block; opacity: 1; }

        /* --- MESSAGES AREA --- */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 240px; /* Jarak aman agar pesan tidak tertutup input */
        }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }

        .chat-user {
            background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%);
            border-bottom-right-radius: 4px;
        }

        .chat-ai {
            background: #18181f;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom-left-radius: 4px;
        }

        .prose pre { 
            background: #000000 !important; 
            padding: 1.25rem; 
            border-radius: 1.2rem; 
            border: 1px solid #1e1e2e; 
            margin: 1.2rem 0;
            overflow-x: auto; 
        }

        /* --- INPUT AREA (POSISI DINAIKKAN) --- */
        footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            /* Menaikkan posisi footer secara keseluruhan */
            padding: 1.5rem 1.5rem calc(3.5rem + env(safe-area-inset-bottom)) 1.5rem; 
            background: linear-gradient(to top, var(--bg-ultra-dark) 80%, transparent);
            z-index: 60;
        }

        .input-container {
            background: #111116;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .input-container:focus-within {
            border-color: var(--accent-color);
            background: #16161d;
            transform: translateY(-3px);
        }

        textarea:focus { outline: none !important; }

        /* --- ANIMATIONS --- */
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-msg { animation: msgIn 0.4s ease-out forwards; }

        .typing-dot {
            width: 5px; height: 5px; background: var(--accent-color);
            border-radius: 50%; animation: blink 1s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <aside id="sidebar" class="flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">Riwayat Chat</span>
                <button onclick="clearHistory()" class="text-zinc-600 hover:text-white transition-colors">
                    <i class="fas fa-trash-can text-sm"></i>
                </button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll"></div>
        </aside>

        <div class="main-wrapper">
            <nav class="h-20 flex items-center justify-between px-6 shrink-0 z-50">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-all">
                        <i class="fas fa-bars-staggered text-zinc-400"></i>
                    </button>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                            <i class="fas fa-robot text-white text-lg"></i>
                        </div>
                        <div>
                            <span class="block text-sm font-bold text-white">ZAAM<span class="text-indigo-500">AI</span></span>
                            <div class="flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                                <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">ONLINE</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="createNewChat()" class="w-10 h-10 rounded-full bg-indigo-600/10 flex items-center justify-center border border-indigo-500/20 hover:bg-indigo-600 transition-all group">
                    <i class="fas fa-plus text-indigo-400 group-hover:text-white text-xs"></i>
                </button>
            </nav>

            <main id="chat-window" class="custom-scroll px-4">
                <div class="max-w-3xl mx-auto py-8 space-y-8" id="messages-list">
                    <div id="intro" class="text-center py-20 space-y-6">
                        <div class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center mx-auto border border-white/10">
                            <i class="fas fa-robot text-2xl text-indigo-500"></i>
                        </div>
                        <h2 class="text-xl font-bold text-white tracking-tight">Halo! ZaamAi siap membantu</h2>
                        <p class="text-zinc-500 text-sm max-w-xs mx-auto leading-relaxed">Tanyakan apa saja, dari koding hingga analisis data.</p>
                    </div>
                </div>
            </main>

            <footer>
                <div class="max-w-3xl mx-auto">
                    <div id="typing-status" class="hidden mb-4 px-2">
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div></div>
                            <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">ZaamAi Berpikir...</span>
                        </div>
                    </div>

                    <div class="input-container rounded-[2.2rem] p-2">
                        <div class="flex items-end gap-2 px-3">
                            <textarea 
                                id="user-input"
                                rows="1"
                                placeholder="Tulis pesan..."
                                class="flex-1 bg-transparent border-none text-zinc-200 py-3.5 px-2 text-[15px] resize-none max-h-40 custom-scroll"
                                oninput="autoResize(this)"></textarea>
                            
                            <button 
                                id="send-btn"
                                onclick="handleSend()"
                                class="w-12 h-12 flex items-center justify-center bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl transition-all shadow-lg shadow-indigo-600/40 mb-1">
                                <i class="fas fa-paper-plane text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                                  </html>
